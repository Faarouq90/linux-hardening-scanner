

SCAN_ROOT=/
USER_UID_MIN=100
DISK_THRESHOLD=80

# Space-separated list of log files whose permissions are verified.
# Add or remove paths to match your distro / log rotation setup.
LOG_FILES="/var/log/syslog /var/log/messages /var/log/auth.log /var/log/secure /var/log/kern.log /var/log/audit/audit.log"

# Maximum octal permissions allowed on sensitive log files (default 640).
LOG_FILE_MAX_PERMS=640

# Space-separated list of TCP ports expected to be listening on this host.
# Any port not in this list will be flagged as unexpected by checks/services.sh.
# Extend this list to match your environment (e.g. "22 80 443 3306").
ALLOWED_PORTS="22"

